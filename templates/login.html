{% set title = "Sign in · CityCab" %}
{% extends "base.html" %}
{% block navbar %}{% endblock %}

{% block body %}
<main class="center-screen">
  <div class="card fade-up" style="width:100%; max-width:420px;">
    <div class="text-center" style="margin-bottom: 28px;">
      <span class="brand-badge" style="display:inline-grid; width:52px; height:52px; border-radius:16px; margin-bottom:16px;">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h14M6 17l1.2-5.2A2 2 0 0 1 9.15 10h5.7a2 2 0 0 1 1.95 1.8L18 17M7 17v2M17 17v2"/><circle cx="8" cy="14.5" r="1"/><circle cx="16" cy="14.5" r="1"/></svg>
      </span>
      <h1 class="title-xl" style="font-size:28px;">Welcome back</h1>
      <p class="subtitle">Sign in to book your next ride.</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <div class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>
          <input class="input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg mt-4">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        Sign in
      </button>
    </form>

    <p class="text-center text-muted mt-5" style="font-size:14px;">
      Don't have an account? <a href="{{ url_for('register') }}" class="link-accent">Create one</a>
    </p>
  </div>
</main>
{% endblock %}
